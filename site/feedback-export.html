<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Session Feedback – Admin Only</title>
  <link rel="icon" href="favicon.ico">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      max-width: 480px;
      margin: 4rem auto;
      padding: 2rem;
      background: #f5f5f5;
    }
    h1 { font-size: 1.25rem; color: #333; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      background: #0057B0;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #003164; color: white; }
    .count { font-weight: 600; color: #0057B0; }
    .note { font-size: 0.8rem; color: #999; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>Session Feedback Export</h1>
  <p>Admin only. This page is not linked from the conference site. Export ratings and comments from this browser.</p>
  <p id="countDisplay"></p>
  <button type="button" class="btn" id="exportBtn">Download session-ratings.json</button>
  <p class="note">Save the file to <code>site/data/session-ratings.json</code> to back up or load feedback.</p>

  <script>
    const RATINGS_KEY = "kestria_session_ratings";

    function getRatings() {
      try {
        const raw = localStorage.getItem(RATINGS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    document.getElementById("countDisplay").innerHTML = (() => {
      const r = getRatings();
      const n = Object.keys(r).length;
      return n === 0
        ? "No feedback collected yet in this browser."
        : `<span class="count">${n}</span> session rating(s) to export.`;
    })();

    document.getElementById("exportBtn").addEventListener("click", () => {
      const ratings = getRatings();
      const blob = new Blob([JSON.stringify(ratings, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "session-ratings.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
